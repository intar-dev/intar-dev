name: Stardrive Release
run-name: "${{ format('Stardrive release {0} from {1}', inputs.bump, github.ref_name) }}"

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Semantic version increment for the next release tag
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: stardrive-release
  cancel-in-progress: false

env:
  PROJECT_ID: stardrive
  STARDRIVE_DIR: projects/stardrive
  TAG_PREFIX: stardrive/

jobs:
  release:
    name: Tag and publish stardrive release
    runs-on: namespace-profile-intar-dev

    steps:
      - name: Ensure the workflow runs from main
        run: |
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "This workflow must be run from main, got ${GITHUB_REF_NAME}." >&2
            exit 1
          fi

      - name: Checkout
        uses: namespacelabs/nscloud-checkout-action@v9
        with:
          fetch-depth: 0

      - name: Determine next release tag
        id: next
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          set -euo pipefail

          latest_project_tag="$(git tag --list "${TAG_PREFIX}v*" --sort=-v:refname | awk -v prefix="${TAG_PREFIX}" '
            index($0, prefix "v") == 1 && $0 ~ /^.+\/v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }
          ')"
          previous_tag=""

          if [ -n "${latest_project_tag}" ]; then
            latest_version_tag="${latest_project_tag#"${TAG_PREFIX}"}"
            previous_tag="${latest_project_tag}"
          elif [ -f "Formula/stardrive.rb" ]; then
            latest_version_tag="$(sed -n 's/^[[:space:]]*version "\([0-9][0-9.]*\)".*/v\1/p' Formula/stardrive.rb | head -n 1)"

            if [ -n "${latest_version_tag}" ] && git rev-parse --verify --quiet "refs/tags/${latest_version_tag}" >/dev/null; then
              previous_tag="${latest_version_tag}"
            fi
          else
            latest_version_tag=""
          fi

          if [ -z "${latest_version_tag}" ]; then
            next_version_tag="v0.1.0"
          else
            version="${latest_version_tag#v}"
            IFS='.' read -r major minor patch <<<"${version}"

            case "${BUMP}" in
              patch)
                patch=$((patch + 1))
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              *)
                echo "Unsupported bump: ${BUMP}" >&2
                exit 1
                ;;
            esac

            next_version_tag="v${major}.${minor}.${patch}"
          fi

          next_version="${next_version_tag#v}"
          next_tag="${TAG_PREFIX}${next_version_tag}"

          if git rev-parse --verify --quiet "refs/tags/${next_tag}" >/dev/null; then
            echo "Tag ${next_tag} already exists." >&2
            exit 1
          fi

          {
            echo "tag=${next_tag}"
            echo "version=${next_version}"
            echo "version_tag=${next_version_tag}"
            echo "previous_tag=${previous_tag}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ env.STARDRIVE_DIR }}/go.mod
          cache: false

      - name: Set up Namespace Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Run tests
        working-directory: ${{ env.STARDRIVE_DIR }}
        run: go test ./...

      - name: Build release artifacts
        working-directory: ${{ env.STARDRIVE_DIR }}
        env:
          VERSION: ${{ steps.next.outputs.version }}
        run: |
          set -euo pipefail

          dist_dir="${PWD}/dist"
          mkdir -p "${dist_dir}"

          build_date="$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          ldflags="-s -w"
          ldflags="${ldflags} -X github.com/intar-dev/stardrive/internal/buildinfo.Version=${VERSION}"
          ldflags="${ldflags} -X github.com/intar-dev/stardrive/internal/buildinfo.Commit=${GITHUB_SHA}"
          ldflags="${ldflags} -X github.com/intar-dev/stardrive/internal/buildinfo.Date=${build_date}"

          build_archive() {
            local goos="$1"
            local goarch="$2"
            local format="$3"
            local archive="${PROJECT_ID}_${VERSION}_${goos}_${goarch}"
            local binary="${PROJECT_ID}"
            local workdir

            if [ "${goos}" = "windows" ]; then
              binary="${binary}.exe"
            fi

            workdir="$(mktemp -d)"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "${ldflags}" -o "${workdir}/${binary}" .

            case "${format}" in
              tar.gz)
                tar -C "${workdir}" -czf "${dist_dir}/${archive}.tar.gz" "${binary}"
                ;;
              zip)
                (cd "${workdir}" && zip -q "${dist_dir}/${archive}.zip" "${binary}")
                ;;
              *)
                echo "Unsupported archive format: ${format}" >&2
                exit 1
                ;;
            esac

            rm -rf "${workdir}"
          }

          build_archive linux amd64 tar.gz
          build_archive linux arm64 tar.gz
          build_archive darwin amd64 tar.gz
          build_archive darwin arm64 tar.gz
          build_archive windows amd64 zip
          build_archive windows arm64 zip

          (
            cd "${dist_dir}"
            sha256sum "${PROJECT_ID}_${VERSION}_"* > "${PROJECT_ID}_${VERSION}_checksums.txt"
          )

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.next.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: ${{ format('{0} {1}', env.PROJECT_ID, steps.next.outputs.version_tag) }}
          generate_release_notes: true
          previous_tag: ${{ steps.next.outputs.previous_tag }}
          make_latest: false
          fail_on_unmatched_files: true
          files: |
            ${{ env.STARDRIVE_DIR }}/dist/${{ env.PROJECT_ID }}_${{ steps.next.outputs.version }}_*

      - name: Update Homebrew formula
        env:
          TAG: ${{ steps.next.outputs.tag }}
          VERSION: ${{ steps.next.outputs.version }}
          VERSION_TAG: ${{ steps.next.outputs.version_tag }}
        run: |
          set -euo pipefail

          git fetch origin main
          git checkout -B main origin/main

          ./projects/stardrive/scripts/update-homebrew-formula.sh \
            --tag "${TAG}" \
            --checksums "${STARDRIVE_DIR}/dist/stardrive_${VERSION}_checksums.txt" \
            --repo "${GITHUB_REPOSITORY}"

          if git diff --quiet --exit-code -- Formula/stardrive.rb; then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/stardrive.rb
          git commit -m "chore(homebrew): update stardrive formula for ${VERSION_TAG}"
          git push origin HEAD:main
