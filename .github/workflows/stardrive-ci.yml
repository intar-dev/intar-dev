name: Stardrive Validate
run-name: "${{ github.event_name == 'pull_request' && format('Stardrive validate PR #{0}', github.event.pull_request.number) || format('Stardrive validate {0}', github.ref_name) }}"

on:
  pull_request:
    paths:
      - ".github/workflows/stardrive-ci.yml"
      - ".github/workflows/stardrive-release.yml"
      - "Formula/stardrive.rb"
      - "projects/stardrive/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/stardrive-ci.yml"
      - ".github/workflows/stardrive-release.yml"
      - "Formula/stardrive.rb"
      - "projects/stardrive/**"

permissions:
  contents: read

jobs:
  test:
    name: Run stardrive tests
    runs-on: namespace-profile-intar-dev

    steps:
      - name: Checkout
        uses: namespacelabs/nscloud-checkout-action@v9

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: projects/stardrive/go.mod
          cache: false

      - name: Set up Namespace Go cache
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          cache: go

      - name: Run tests
        working-directory: projects/stardrive
        run: go test ./...
